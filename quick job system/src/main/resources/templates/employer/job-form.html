<!-- Requirements: Job create/edit form for employers -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${jobPostDto.id != null} ? 'Edit Job' : 'Post New Job'">Job Form - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>

<main class="flex-grow-1">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h2 th:text="${jobPostDto.id != null} ? 'Edit Job Post' : 'Create New Job Post'">Job Form</h2>

                    <form th:action="${jobPostDto.id != null} ? @{/employer/jobs/{id}/edit(id=${jobPostDto.id})} : @{/employer/jobs/new}"
                          th:object="${jobPostDto}" method="post">

                        <div class="mb-3">
                            <label for="title" class="form-label">Job Title</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}"
                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="4"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" th:field="*{location}"
                                   th:classappend="${#fields.hasErrors('location')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="payRate" class="form-label">Pay Rate ($)</label>
                                <input type="number" step="0.01" class="form-control" id="payRate" th:field="*{payRate}"
                                       th:classappend="${#fields.hasErrors('payRate')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('payRate')}" th:errors="*{payRate}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="workersNeeded" class="form-label">Workers Needed</label>
                                <input type="number" class="form-control" id="workersNeeded" th:field="*{workersNeeded}" min="1">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="startTime" class="form-label">Start Time</label>
                                <input type="datetime-local" class="form-control" id="startTime" th:field="*{startTime}"
                                       th:classappend="${#fields.hasErrors('startTime')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="endTime" class="form-label">End Time</label>
                                <input type="datetime-local" class="form-control" id="endTime" th:field="*{endTime}"
                                       th:classappend="${#fields.hasErrors('endTime')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="requiredSkills" class="form-label">Required Skills</label>
                            <input type="text" class="form-control" id="requiredSkills" th:field="*{requiredSkills}"
                                   placeholder="e.g. heavy lifting, customer service, driving">
                        </div>

                        <div class="mb-3">
                            <label for="jobType" class="form-label">Job type (for worker search)</label>
                            <select class="form-select" id="jobType" th:field="*{jobType}">
                                <option value="">Not specified</option>
                                <option value="general labor">General labor</option>
                                <option value="delivery">Delivery / courier</option>
                                <option value="events">Events / hospitality</option>
                                <option value="cleaning">Cleaning</option>
                                <option value="warehouse">Warehouse</option>
                                <option value="retail">Retail</option>
                                <option value="construction">Construction / trade</option>
                                <option value="tech">Tech / office</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" th:text="${jobPostDto.id != null} ? 'Update' : 'Create'">Submit</button>
                            <a th:href="@{/employer/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
