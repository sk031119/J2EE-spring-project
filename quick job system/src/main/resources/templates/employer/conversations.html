<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker messages - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h1 class="mb-4">Worker messages</h1>
        <p class="text-muted">Questions and back-and-forth with workers about your job posts.</p>

        <div th:if="${#lists.isEmpty(conversations)}" class="alert alert-info">
            No conversations yet. When a worker messages you about a job, it will appear here.
        </div>

        <div class="list-group" th:if="${!#lists.isEmpty(conversations)}">
            <a th:each="c : ${conversations}"
               th:href="@{/employer/jobs/{jid}/chats/{cid}(jid=${c.jobPost.id},cid=${c.id})}"
               class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
                <div>
                    <div class="fw-semibold" th:text="${c.jobPost.title}">Job</div>
                    <small class="text-muted" th:text="${c.worker.fullName}">Worker</small>
                </div>
                <small class="text-muted" th:text="${#temporals.format(c.updatedAt, 'MMM d HH:mm')}">Date</small>
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
