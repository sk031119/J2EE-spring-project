<!-- Requirements: Employer job detail view with applicants list and approve/reject actions -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Detail - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <a th:href="@{/employer/dashboard}" class="btn btn-outline-secondary mb-3">&larr; Back to Dashboard</a>

        <div class="card mb-4">
            <div class="card-body">
                <h2 th:text="${job.title}">Job Title</h2>
                <span class="badge mb-2"
                      th:classappend="${job.status.name() == 'OPEN'} ? 'bg-success' : 'bg-secondary'"
                      th:text="${job.status}">Status</span>
                <p th:text="${job.description}">Description</p>

                <div class="row">
                    <div class="col-md-3"><strong>Location:</strong> <span th:text="${job.location}">Location</span></div>
                    <div class="col-md-3"><strong>Pay Rate:</strong> $<span th:text="${job.payRate}">0</span></div>
                    <div class="col-md-3"><strong>Workers Needed:</strong> <span th:text="${job.workersNeeded}">1</span></div>
                    <div class="col-md-3"><strong>Skills:</strong> <span th:text="${job.requiredSkills} ?: 'None specified'">Skills</span></div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-6"><strong>Start:</strong> <span th:text="${#temporals.format(job.startTime, 'yyyy-MM-dd HH:mm')}">Time</span></div>
                    <div class="col-md-6"><strong>End:</strong> <span th:text="${#temporals.format(job.endTime, 'yyyy-MM-dd HH:mm')}">Time</span></div>
                </div>
            </div>
        </div>

        <h3>Applications (<span th:text="${#lists.size(applications)}">0</span>)</h3>
        <div th:if="${#lists.isEmpty(applications)}" class="alert alert-info">
            No applications yet.
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(applications)}">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Worker Name</th>
                        <th>Email</th>
                        <th>Applied At</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${applications}">
                        <td th:text="${app.worker.fullName}">Name</td>
                        <td th:text="${app.worker.email}">Email</td>
                        <td th:text="${#temporals.format(app.appliedAt, 'yyyy-MM-dd HH:mm')}">Date</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${app.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${app.status.name() == 'APPROVED'} ? 'bg-success' : (${app.status.name() == 'REJECTED'} ? 'bg-danger' : 'bg-secondary'))"
                                  th:text="${app.status}">Status</span>
                        </td>
                        <td>
                            <div th:if="${app.status.name() == 'PENDING'}" class="d-inline">
                                <form th:action="@{/employer/applications/{id}/approve(id=${app.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-success">Approve</button>
                                </form>
                                <form th:action="@{/employer/applications/{id}/reject(id=${app.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-danger">Reject</button>
                                </form>
                            </div>
                            <a th:href="@{/messages/application/{id}(id=${app.id})}" class="btn btn-sm btn-outline-primary">Messages</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
