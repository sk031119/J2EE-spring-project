<!-- Requirements: Employer dashboard showing own job listings -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Employer Dashboard</h1>
            <a th:href="@{/employer/jobs/new}" class="btn btn-primary">Post New Job</a>
        </div>

        <div class="card mb-3" th:if="${profile != null}">
            <div class="card-body">
                <h5 th:text="${profile.companyName}">Company Name</h5>
                <p class="text-muted" th:text="${profile.companyDescription}">Description</p>
            </div>
        </div>

        <h3>Your Job Posts</h3>
        <div th:if="${#lists.isEmpty(jobs)}" class="alert alert-info">
            You haven't posted any jobs yet.
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(jobs)}">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Location</th>
                        <th>Pay Rate</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="job : ${jobs}">
                        <td>
                            <a th:href="@{/employer/jobs/{id}(id=${job.id})}" th:text="${job.title}">Title</a>
                        </td>
                        <td th:text="${job.location}">Location</td>
                        <td th:text="'$' + ${job.payRate}">Pay</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${job.status.name() == 'OPEN'} ? 'bg-success' : (${job.status.name() == 'CLOSED'} ? 'bg-secondary' : (${job.status.name() == 'FILLED'} ? 'bg-info' : 'bg-danger'))"
                                  th:text="${job.status}">Status</span>
                        </td>
                        <td th:text="${#temporals.format(job.createdAt, 'yyyy-MM-dd')}">Date</td>
                        <td>
                            <a th:href="@{/employer/jobs/{id}/edit(id=${job.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            <form th:if="${job.status.name() == 'OPEN'}" th:action="@{/employer/jobs/{id}/close(id=${job.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-warning" onclick="return confirm('Close this job?')">Close</button>
                            </form>
                            <form th:action="@{/employer/jobs/{id}/delete(id=${job.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this job?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
