<!-- Requirements: Worker applications list with cancel and message actions -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h1 class="mb-4">My Applications</h1>

        <div th:if="${#lists.isEmpty(applications)}" class="alert alert-info">
            You haven't applied to any jobs yet. <a th:href="@{/worker/jobs}">Browse jobs</a>
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(applications)}">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Job Title</th>
                        <th>Company</th>
                        <th>Pay Rate</th>
                        <th>Applied At</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${applications}">
                        <td th:text="${app.jobPost.title}">Title</td>
                        <td th:text="${app.jobPost.employerProfile.companyName}">Company</td>
                        <td th:text="'$' + ${app.jobPost.payRate}">Pay</td>
                        <td th:text="${#temporals.format(app.appliedAt, 'yyyy-MM-dd HH:mm')}">Date</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${app.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${app.status.name() == 'APPROVED'} ? 'bg-success' : (${app.status.name() == 'REJECTED'} ? 'bg-danger' : 'bg-secondary'))"
                                  th:text="${app.status}">Status</span>
                        </td>
                        <td>
                            <form th:if="${app.status.name() == 'PENDING'}"
                                  th:action="@{/worker/applications/{id}/cancel(id=${app.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Cancel this application?')">Cancel</button>
                            </form>
                            <a th:href="@{/messages/application/{id}(id=${app.id})}" class="btn btn-sm btn-outline-primary">Messages</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
