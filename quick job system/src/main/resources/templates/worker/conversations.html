<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job messages - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h1 class="mb-4">Job messages</h1>
        <p class="text-muted">Conversations you have started with employers about open jobs.</p>

        <div th:if="${#lists.isEmpty(conversations)}" class="alert alert-info">
            You have no job chats yet. Open a job and use <strong>Message employer</strong> to ask a question.
        </div>

        <div class="list-group" th:if="${!#lists.isEmpty(conversations)}">
            <a th:each="c : ${conversations}" th:href="@{/worker/jobs/{id}/chat(id=${c.jobPost.id})}"
               class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
                <div>
                    <div class="fw-semibold" th:text="${c.jobPost.title}">Title</div>
                    <small class="text-muted" th:text="${c.jobPost.employerProfile.companyName}">Company</small>
                </div>
                <small class="text-muted" th:text="${#temporals.format(c.updatedAt, 'MMM d')}">Date</small>
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
