<!-- Requirements: Worker job detail view with apply button -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Detail - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <a th:href="@{/worker/jobs}" class="btn btn-outline-secondary mb-3">&larr; Back to Jobs</a>

        <div class="card">
            <div class="card-body">
                <h2 th:text="${job.title}">Job Title</h2>
                <span class="badge bg-success mb-3" th:text="${job.status}">OPEN</span>

                <p th:text="${job.description}">Description</p>

                <div class="row mt-3">
                    <div class="col-md-6">
                        <ul class="list-unstyled">
                            <li class="mb-2"><strong>Location:</strong> <span th:text="${job.location}">Location</span></li>
                            <li class="mb-2"><strong>Pay Rate:</strong> $<span th:text="${job.payRate}">0</span></li>
                            <li class="mb-2"><strong>Workers Needed:</strong> <span th:text="${job.workersNeeded}">1</span></li>
                            <li class="mb-2"><strong>Required Skills:</strong> <span th:text="${job.requiredSkills} ?: 'None specified'">Skills</span></li>
                        </ul>
                    </div>
                    <div class="col-md-6">
                        <ul class="list-unstyled">
                            <li class="mb-2"><strong>Start:</strong> <span th:text="${#temporals.format(job.startTime, 'yyyy-MM-dd HH:mm')}">Time</span></li>
                            <li class="mb-2"><strong>End:</strong> <span th:text="${#temporals.format(job.endTime, 'yyyy-MM-dd HH:mm')}">Time</span></li>
                            <li class="mb-2"><strong>Posted:</strong> <span th:text="${#temporals.format(job.createdAt, 'yyyy-MM-dd')}">Date</span></li>
                            <li class="mb-2"><strong>Company:</strong> <span th:text="${job.employerProfile.companyName}">Company</span></li>
                        </ul>
                    </div>
                </div>

                <div class="mt-4" th:if="${job.status.name() == 'OPEN'}">
                    <div th:if="${alreadyApplied}">
                        <span class="badge bg-info">You have already applied for this job</span>
                    </div>
                    <div th:unless="${alreadyApplied}">
                        <form th:action="@{/worker/jobs/{id}/apply(id=${job.id})}" method="post">
                            <button type="submit" class="btn btn-primary btn-lg" onclick="return confirm('Apply for this job?')">Apply Now</button>
                        </form>
                    </div>
                </div>
                <div class="mt-4" th:if="${job.status.name() != 'OPEN'}">
                    <span class="badge bg-secondary">This job is no longer accepting applications</span>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
