<!-- Requirements: Admin dashboard with platform statistics -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h1 class="mb-4">Admin Dashboard</h1>

        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card text-center p-4 bg-primary text-white">
                    <h2 th:text="${totalUsers}">0</h2>
                    <p class="mb-0">Total Users</p>
                    <a th:href="@{/admin/users}" class="btn btn-light btn-sm mt-2">Manage Users</a>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-center p-4 bg-success text-white">
                    <h2 th:text="${totalJobs}">0</h2>
                    <p class="mb-0">Total Job Posts</p>
                    <a th:href="@{/admin/jobs}" class="btn btn-light btn-sm mt-2">Manage Jobs</a>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-center p-4 bg-info text-white">
                    <h2 th:text="${totalApplications}">0</h2>
                    <p class="mb-0">Total Applications</p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
