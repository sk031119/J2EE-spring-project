<!-- Requirements: Admin job management page with delete action -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Management - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h1 class="mb-4">Job Management</h1>

        <div th:if="${#lists.isEmpty(jobs)}" class="alert alert-info">
            No job posts in the system.
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(jobs)}">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Employer</th>
                        <th>Location</th>
                        <th>Pay Rate</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="job : ${jobs}">
                        <td th:text="${job.id}">1</td>
                        <td th:text="${job.title}">Title</td>
                        <td th:text="${job.employerProfile.companyName}">Company</td>
                        <td th:text="${job.location}">Location</td>
                        <td th:text="'$' + ${job.payRate}">Pay</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${job.status.name() == 'OPEN'} ? 'bg-success' : (${job.status.name() == 'CLOSED'} ? 'bg-secondary' : 'bg-danger')"
                                  th:text="${job.status}">Status</span>
                        </td>
                        <td th:text="${#temporals.format(job.createdAt, 'yyyy-MM-dd')}">Date</td>
                        <td>
                            <form th:action="@{/admin/jobs/{id}/delete(id=${job.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Remove this job post?')">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
