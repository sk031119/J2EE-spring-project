<!-- Requirements: Admin user management page with enable/disable toggle -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <h1 class="mb-4">User Management</h1>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.fullName}">Name</td>
                        <td th:text="${user.email}">Email</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-danger' : (${user.role.name() == 'EMPLOYER'} ? 'bg-primary' : 'bg-success')"
                                  th:text="${user.role}">Role</span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${user.enabled} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${user.enabled} ? 'Active' : 'Disabled'">Status</span>
                        </td>
                        <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}">Date</td>
                        <td>
                            <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm"
                                        th:classappend="${user.enabled} ? 'btn-outline-warning' : 'btn-outline-success'"
                                        th:text="${user.enabled} ? 'Disable' : 'Enable'">Toggle</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
