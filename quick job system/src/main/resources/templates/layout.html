<!-- Requirements: Reusable layout fragments - header, navbar, footer -->
<!-- Used by all pages via th:replace -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Navbar fragment -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark qj-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">QuickJob</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
                    <a class="nav-link" th:href="@{/employer/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
                    <a class="nav-link" th:href="@{/employer/jobs/new}">Post Job</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
                    <a class="nav-link" th:href="@{/employer/conversations}">Worker messages</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('WORKER')">
                    <a class="nav-link" th:href="@{/worker/jobs}">Browse Jobs</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('WORKER')">
                    <a class="nav-link" th:href="@{/worker/applications}">My Applications</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('WORKER')">
                    <a class="nav-link" th:href="@{/worker/conversations}">Job messages</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">Users</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/jobs}">Jobs</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light" sec:authentication="name">User</span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Footer fragment -->
<footer th:fragment="footer" class="footer mt-auto py-3 bg-dark text-light qj-footer">
    <div class="container text-center">
        <span>Quick Job Posting and Matching System &copy; 2026</span>
    </div>
</footer>

<!-- Alert messages fragment -->
<div th:fragment="alerts" class="container mt-3">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

</html>
