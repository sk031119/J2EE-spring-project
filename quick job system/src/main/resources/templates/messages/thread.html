<!-- Requirements: Message thread view for an application with send message form -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <a href="javascript:history.back()" class="btn btn-outline-secondary mb-3">&larr; Back</a>

        <div class="card mb-3">
            <div class="card-body">
                <h5>Messages for: <span th:text="${application.jobPost.title}">Job Title</span></h5>
                <p class="text-muted mb-0">
                    Worker: <span th:text="${application.worker.fullName}">Worker</span> |
                    Status: <span class="badge bg-info" th:text="${application.status}">Status</span>
                </p>
            </div>
        </div>

        <!-- Message list -->
        <div class="message-thread mb-4">
            <div th:if="${#lists.isEmpty(messages)}" class="alert alert-light text-center">
                No messages yet. Start the conversation below.
            </div>

            <div th:each="msg : ${messages}" class="card mb-2"
                 th:classappend="${msg.sender.id == currentUser.id} ? 'border-primary' : ''">
                <div class="card-body py-2 px-3">
                    <div class="d-flex justify-content-between">
                        <strong th:text="${msg.sender.fullName}">Sender</strong>
                        <small class="text-muted" th:text="${#temporals.format(msg.createdAt, 'yyyy-MM-dd HH:mm')}">Time</small>
                    </div>
                    <p class="mb-0 mt-1" th:text="${msg.content}">Content</p>
                </div>
            </div>
        </div>

        <!-- Send message form -->
        <div class="card">
            <div class="card-body">
                <form th:action="@{/messages/application/{id}(id=${application.id})}"
                      th:object="${messageDto}" method="post">
                    <div class="mb-3">
                        <label for="content" class="form-label">Send a message</label>
                        <textarea class="form-control" id="content" th:field="*{content}" rows="3"
                                  placeholder="Type your message..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send</button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
