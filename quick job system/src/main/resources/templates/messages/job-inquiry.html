<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job messages - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="flex-grow-1">
    <div class="container py-4">
        <a th:if="${chatKind == 'worker'}" th:href="@{/worker/jobs/{id}(id=${job.id})}" class="btn btn-outline-secondary mb-3">&larr; Back to job</a>
        <a th:if="${chatKind == 'employer'}" th:href="@{/employer/jobs/{id}/chats(id=${job.id})}" class="btn btn-outline-secondary mb-3">&larr; All chats for this job</a>

        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <h4 class="mb-1" th:text="${job.title}">Job</h4>
                <p class="text-muted mb-0">
                    Chat with <strong th:text="${otherPartyLabel}">Party</strong>
                    <span th:if="${job.jobType != null}" class="badge bg-light text-dark ms-1" th:text="${job.jobType}">type</span>
                </p>
            </div>
        </div>

        <div class="chat-window card shadow-sm mb-3">
            <div class="card-body chat-scroll">
                <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-5">
                    No messages yet. Say hello below.
                </div>
                <div th:each="msg : ${messages}" class="chat-row"
                     th:classappend="${msg.sender.id == currentUser.id} ? 'chat-row-me' : 'chat-row-them'">
                    <div class="chat-bubble">
                        <div class="chat-meta small text-muted">
                            <span th:text="${msg.sender.fullName}">Name</span>
                            &middot;
                            <span th:text="${#temporals.format(msg.createdAt, 'MMM d HH:mm')}">Time</span>
                        </div>
                        <div class="chat-text" th:text="${msg.content}">Text</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:if="${chatKind == 'worker'}" th:action="@{/worker/jobs/{id}/chat(id=${job.id})}"
                      th:object="${messageDto}" method="post" class="chat-compose">
                    <label for="content" class="form-label">Your message</label>
                    <textarea class="form-control mb-2" id="content" th:field="*{content}" rows="2"
                              placeholder="Ask about schedule, dress code, tools..." required></textarea>
                    <button type="submit" class="btn btn-primary">Send</button>
                </form>
                <form th:if="${chatKind == 'employer'}"
                      th:action="@{/employer/jobs/{jid}/chats/{cid}(jid=${job.id},cid=${conversation.id})}"
                      th:object="${messageDto}" method="post" class="chat-compose">
                    <label for="contentEmp" class="form-label">Reply</label>
                    <textarea class="form-control mb-2" id="contentEmp" th:field="*{content}" rows="2" required></textarea>
                    <button type="submit" class="btn btn-primary">Send</button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
