<!-- Requirements: Error page for displaying error messages -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - QuickJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout :: navbar}"></nav>

<main class="flex-grow-1">
    <div class="container py-5 text-center">
        <h1 class="display-1 text-danger" th:text="${status} ?: 'Error'">Error</h1>
        <p class="lead" th:text="${errorMessage} ?: 'An unexpected error occurred.'">An error occurred.</p>
        <a th:href="@{/}" class="btn btn-primary">Go Home</a>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
